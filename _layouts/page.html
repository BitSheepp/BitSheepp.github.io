---
layout: default
---
<article class="page-shell reading-wrap">
  <section class="page-panel">
    {% if page.page_kicker %}
      <div class="page-kicker">{{ page.page_kicker }}</div>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-intro muted">{{ page.description }}</p>
    {% endif %}
    {% if page.tags %}
      <div class="badges">
        {% for tag in page.tags %}<span class="badge">{{ tag }}</span>{% endfor %}
      </div>
    {% endif %}
  </section>

  <section class="section section-reading">
    {{ content }}
  </section>
</article>
