<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chunyang He | Research Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/site.css" />
</head>
<body>
  <div class="mesh"></div>
  <main class="wrap">
    <div class="topbar panel">
      <div class="lang-switch">
        <button data-lang-btn="en">EN</button>
        <button data-lang-btn="zh">中文</button>
      </div>
    </div>

    <section class="hero panel">
      <div class="photo-frame"><img id="profile-photo" class="avatar" alt="Profile photo" /></div>
      <div>
        <p class="eyebrow" data-i18n="portfolio"></p>
        <h1 id="name"></h1>
        <p id="headline" class="lead"></p>
        <p id="objective"></p>
        <div id="contact" class="chips"></div>
      </div>
    </section>

    <section class="panel">
      <h2 data-i18n="quick_summary"></h2>
      <div id="metrics" class="metrics"></div>
      <ul id="focus" class="focus"></ul>
    </section>

    <section class="panel">
      <h2 data-i18n="explore_sections"></h2>
      <div class="cards">
        <a class="card-link" href="pages/experience.html">
          <h3 data-i18n="sec_experience"></h3>
          <p data-i18n="sec_experience_desc"></p>
        </a>
        <a class="card-link" href="pages/publications.html">
          <h3 data-i18n="sec_publications"></h3>
          <p data-i18n="sec_publications_desc"></p>
        </a>
        <a class="card-link" href="pages/education-skills.html">
          <h3 data-i18n="sec_education_skills"></h3>
          <p data-i18n="sec_education_skills_desc"></p>
        </a>
      </div>
    </section>
  </main>
  <script src="scripts/common.js"></script>
  <script src="scripts/index.js"></script>
</body>
</html>
