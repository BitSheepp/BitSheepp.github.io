<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chunyang He | Research Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/site.css?v=20260606a" />
</head>
<body>
  <main class="layout home-layout">
    <header class="site-header">
      <div class="brand-lockup">
        <div class="brand">CH</div>
        <div class="brand-text">
          <strong>Chunyang He</strong>
          <span data-i18n="portfolio"></span>
        </div>
      </div>
      <nav class="site-nav">
        <a href="index.html" data-i18n="nav_about"></a>
        <a href="pages/experience.html" data-i18n="nav_research"></a>
        <a href="pages/publications.html" data-i18n="nav_publications"></a>
        <a href="pages/education-skills.html" data-i18n="nav_profile"></a>
      </nav>
      <div class="lang-switch">
        <button data-lang-btn="en">EN</button>
        <button data-lang-btn="zh">&#20013;&#25991;</button>
      </div>
    </header>

    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow" data-i18n="hero_eyebrow"></p>
        <h1 id="name"></h1>
        <p id="headline" class="headline"></p>
        <p id="objective" class="objective"></p>
        <div id="contact" class="contact-tags"></div>
        <div class="cta-row">
          <a class="primary-link" href="pages/publications.html" data-i18n="cta_publications"></a>
          <a class="text-link" href="pages/experience.html" data-i18n="cta_research"></a>
        </div>
      </div>
      <aside class="hero-aside">
        <div class="photo-shell">
          <img id="profile-photo" class="avatar" alt="Profile photo" />
        </div>
        <div class="mini-panel">
          <p class="mini-label" data-i18n="current_focus_label"></p>
          <div id="focus-tags" class="topic-tags"></div>
        </div>
      </aside>
    </section>

    <section class="section-shell">
      <div class="section-heading">
        <p class="section-kicker" data-i18n="section_overview_kicker"></p>
        <h2 data-i18n="quick_summary"></h2>
        <p class="section-intro" data-i18n="summary_intro"></p>
      </div>
      <div id="metrics" class="metrics"></div>
    </section>

    <section class="section-shell">
      <div class="section-heading">
        <p class="section-kicker" data-i18n="section_research_kicker"></p>
        <h2 data-i18n="selected_research"></h2>
        <p class="section-intro" data-i18n="selected_research_intro"></p>
      </div>
      <div id="research-themes" class="feature-grid"></div>
    </section>

    <section class="section-shell two-column">
      <div>
        <div class="section-heading compact">
          <p class="section-kicker" data-i18n="section_updates_kicker"></p>
          <h2 data-i18n="recent_updates"></h2>
        </div>
        <div id="recent-updates" class="timeline-list"></div>
      </div>
      <div>
        <div class="section-heading compact">
          <p class="section-kicker" data-i18n="section_publications_kicker"></p>
          <h2 data-i18n="selected_publications"></h2>
        </div>
        <div id="selected-publications" class="pub-list"></div>
      </div>
    </section>

    <section class="section-shell">
      <div class="section-heading">
        <p class="section-kicker" data-i18n="section_explore_kicker"></p>
        <h2 data-i18n="explore_sections"></h2>
      </div>
      <div class="grid-links">
        <a class="link-card" href="pages/experience.html">
          <p class="link-eyebrow" data-i18n="nav_research"></p>
          <h3 data-i18n="sec_experience"></h3>
          <p data-i18n="sec_experience_desc"></p>
        </a>
        <a class="link-card" href="pages/publications.html">
          <p class="link-eyebrow" data-i18n="nav_publications"></p>
          <h3 data-i18n="sec_publications"></h3>
          <p data-i18n="sec_publications_desc"></p>
        </a>
        <a class="link-card" href="pages/education-skills.html">
          <p class="link-eyebrow" data-i18n="nav_profile"></p>
          <h3 data-i18n="sec_education_skills"></h3>
          <p data-i18n="sec_education_skills_desc"></p>
        </a>
      </div>
    </section>
  </main>
  <script src="scripts/common.js?v=20260606a"></script>
  <script src="scripts/index.js?v=20260606a"></script>
</body>
</html>
