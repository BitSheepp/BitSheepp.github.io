<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chunyang He - CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="container">
    <header class="hero card">
      <p class="kicker">Curriculum Vitae</p>
      <h1 id="name"></h1>
      <p id="headline" class="headline"></p>
      <div id="contact" class="contact"></div>
    </header>

    <section class="card">
      <h2>Objective</h2>
      <p id="objective"></p>
    </section>

    <section class="card">
      <h2>Academic Experience</h2>
      <div id="experience" class="timeline"></div>
    </section>

    <section class="card grid-two">
      <div>
        <h2>Education</h2>
        <div id="education"></div>
      </div>
      <div>
        <h2>Awards</h2>
        <ul id="awards"></ul>
      </div>
    </section>

    <section class="card grid-two">
      <div>
        <h2>Publications</h2>
        <ul id="publications"></ul>
      </div>
      <div>
        <h2>Skills</h2>
        <div id="skills"></div>
      </div>
    </section>

    <section class="card grid-two">
      <div>
        <h2>Languages</h2>
        <ul id="languages"></ul>
      </div>
      <div>
        <h2>Interests</h2>
        <ul id="interests"></ul>
      </div>
    </section>

    <footer class="footer">Built for easy manual updates via <code>data/profile.json</code>.</footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
