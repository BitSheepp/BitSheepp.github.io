projects_selected:
  - title_en: "High-Throughput Root Phenomics for Tea"
    title_cn: "茶树高通量根系表型组分析"
    role_en: "Principal Leader"
    role_cn: "负责人"
    period: "2022.04 - 2024.06"
    bullets_en:
      - "Analyzed 627 resequenced genomes to build a high-confidence SNP catalogue and map loci related to secondary metabolites."
      - "Built a PyTorch ResNet-34 model for automatic leaf phenotyping with 81.5% accuracy."
    bullets_cn:
      - "分析 627 份重测序材料，构建高可信 SNP 图谱并定位与次生代谢相关的候选位点。"
      - "基于 PyTorch 搭建 ResNet-34 自动表型识别模型，叶片分类准确率达到 81.5%。"
    tags: [GWAS, ResNet-34, SNP]
  - title_en: "PhenoCitrus: Automated Citrus Fruit Phenotyping"
    title_cn: "PhenoCitrus：柑橘果实自动化表型平台"
    role_en: "Co-Leader"
    role_cn: "共同负责人"
    period: "2024.01 - 2025.05"
    bullets_en:
      - "Integrated device design with segmentation and trait extraction workflows for citrus fruit morphology."
      - "Used 3D Gaussian Splatting to reconstruct fruit structure, with key traits reaching Pearson r > 0.90 versus manual measurements."
    bullets_cn:
      - "将设备设计、图像分割与性状提取流程整合为一套柑橘果实形态分析系统。"
      - "基于 3D Gaussian Splatting 重建果实结构，关键性状与人工测量相关系数超过 0.90。"
    tags: [YOLOv8, Segmentation, 3DGS]
  - title_en: "Temperature-Driven Regulation of Ascorbic Acid in Lettuce"
    title_cn: "温度调控生菜抗坏血酸积累机制研究"
    role_en: "Co-author"
    role_cn: "合作作者"
    period: "2023.03 - 2024.05"
    bullets_en:
      - "Established a temperature-gradient experiment and identified strong ascorbic acid responses."
      - "RNA-seq analysis highlighted four major pathways and four candidate genes."
    bullets_cn:
      - "建立温度梯度试验体系，确认抗坏血酸积累存在显著温度响应。"
      - "转录组分析锁定 4 条关键代谢通路与 4 个候选调控基因。"
    tags: [Transcriptomics, Metabolism]

