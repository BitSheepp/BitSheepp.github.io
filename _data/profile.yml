hero_intro_en: >
  I focus on integrating AI with bioinformatics to study multimodal biological data,
  genetic regulation of complex traits, and reproducible genomics workflows. My work
  spans GWAS, transcriptomics, computer vision for phenotyping, and data-driven
  systems that support crop genetics and precision breeding research.
hero_intro_cn: >
  我的研究聚焦于将人工智能与生物信息学结合，用于解析多模态生物数据、复杂性状遗传调控机制，
  以及可复现的基因组学分析流程。当前工作覆盖 GWAS、转录组学、表型视觉分析，以及支撑作物遗传学与精准育种的数据驱动系统。

about_intro_en: >
  This site is designed as a resume-first academic homepage: concise on the front page,
  deeper through dedicated research, publication, and CV pages, and ready to grow toward
  future lab and writing modules.
about_intro_cn: >
  这个网站以学术简历展示为主线：首页保持克制，只呈现核心摘要；更完整的研究、论文与履历内容则通过独立页面展开，
  同时也为未来的实验室展示与博客记录预留了扩展空间。

