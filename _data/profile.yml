about: >
  I focus on integrating AI with bioinformatics to study multimodal biological data,
  genetic regulation of complex traits, and reproducible genomics workflows. My work
  spans GWAS, transcriptomics, computer vision for phenotyping, and data-driven
  systems that support crop genetics and precision breeding research.

