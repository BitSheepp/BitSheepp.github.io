  - Reproducible Pipelines

research_themes:
  - title: "Complex trait genetics in horticultural crops"
    summary: "Using GWAS, transcriptomics, and comparative genomics to identify loci and pathways underlying disease resistance, fruit quality, and developmental variation."
    tags: [GWAS, Transcriptomics, Candidate genes]
  - title: "AI-assisted phenotyping and biological image analysis"
    summary: "Building automated pipelines for root systems, citrus fruit morphology, and other visual phenotypes with deep learning, detection, and 3D reconstruction."
    tags: [PyTorch, YOLO, 3D reconstruction]
  - title: "Bioinformatics infrastructure for reproducible genomics"
    summary: "Designing analysis workflows, data organization strategies, and tool stacks that make large-scale genome and trait studies easier to reproduce and extend."
    tags: [Python, Workflow design, Data integration]
