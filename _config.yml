title: Chunyang He
description: Academic website of Chunyang He
url: https://bitsheepp.github.io
baseurl: ""

theme: jekyll-theme-primer

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

collections:
  research:
    output: true
    permalink: /research/:name/

defaults:
  - scope:
      path: ""
      type: "research"
    values:
      layout: page

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package.json
  - package-lock.json
  - tools
  - home-check.png
  - README.md
  - writer_space
